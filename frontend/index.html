<!DOCTYPE html>
<html>
<head>
    <title>SafeSphere AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

<div class="container">
    <div class="hero">

<div class="logo">

🛡️

</div>

<h1>

How can we

<span>help you today?</span>

</h1>

<p>

Select a category to get started

</p>

</div>

   <div class="help-grid">

    <button class="help-card scam" onclick="selectHelp('scam')">

        <div class="card-top">

            <div class="icon-box">🚨</div>

            <div class="card-text">

                <h3>Scam / Fraud</h3>

                <p>
                    
Report scams, fraud<br>
& phishing attacks
</p>
                

            </div>

            <div class="arrow">➜</div>

        </div>

    </button>


    <button class="help-card women" onclick="selectHelp('women')">

        <div class="card-top">

            <div class="icon-box">👩</div>

            <div class="card-text">

                <h3>Women Safety</h3>

                <p>
                    Personal safety,<br>
                    harassment & protection
                </p>

            </div>

            <div class="arrow">➜</div>

        </div>

    </button>


    <button class="help-card medical" onclick="selectHelp('medical')">

        <div class="card-top">

            <div class="icon-box">🏥</div>

            <div class="card-text">

                <h3>Medical</h3>

                <p>
                    Medical emergencies<br>
                    & health assistance
                </p>

            </div>

            <div class="arrow">➜</div>

        </div>

    </button>


    <button class="help-card disaster" onclick="selectHelp('disaster')">

        <div class="card-top">

            <div class="icon-box">🌊</div>

            <div class="card-text">

                <h3>Disaster</h3>

                <p>
                    Floods, fires,<br>
                    earthquakes & storms
                </p>

            </div>

            <div class="arrow">➜</div>

        </div>

    </button>


    <button class="help-card privacy" onclick="selectHelp('privacy')">

        <div class="card-top">

            <div class="icon-box">🔒</div>

            <div class="card-text">

                <h3>Privacy Leak</h3>

                <p>
                    Protect personal data & sensitive<br>
                     information
                </p>

            </div>

            <div class="arrow">➜</div>

        </div>

    </button>


    <button class="help-card sos" onclick="selectHelp('sos')">

        <div class="card-top">

            <div class="icon-box">🆘</div>

            <div class="card-text">

                <h3>SOS Message</h3>

                <p>
                    Send emergency alerts to trusted<br>
                    contacts
                </p>

            </div>

            <div class="arrow">➜</div>

        </div>

    </button>

</div>
    <div id="questionsBox" class="questions-box">
        <p>Select a help type above to get guided questions.</p>
    </div>

    <div class="input-row">
    <div class="input-container">


    <textarea
        id="userInput"
        placeholder="Describe your situation..."
    ></textarea>

    <button
        class="voice-btn"
        onclick="startVoiceInput()">

        🎤

    </button>

</div>
    </div>

    <button class="analyze-btn" onclick="analyzeSafety()">Analyze Safety</button>

    <div id="result"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
